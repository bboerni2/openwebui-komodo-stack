services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    env_file:
      - .env
    volumes:
      - open-webui:/app/backend/data
      - workspace:/home/user
    depends_on:
      open-terminal:
        condition: service_healthy

  open-tika:
    image: apache/tika:2.9.1.0-full
    container_name: open-tika
    restart: unless-stopped
    expose:
      - "9998"

  litellm_nostream:
    image: nginx:alpine
    container_name: litellm-nostream
    restart: unless-stopped
    volumes:
      - ./nginx/litellm_nostream.conf:/etc/nginx/conf.d/default.conf
    expose:
      - "4100"

volumes:
  open-webui:
  workspace: