services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      # RAG / Vector DB
      VECTOR_DB: chroma
      CHROMA_HTTP_HOST: chromadb
      CHROMA_HTTP_PORT: 8000
      CHROMA_TENANT: default_tenant

      # Document extraction via Tika
      CONTENT_EXTRACTION_ENGINE: tika
      TIKA_SERVER_URL: http://open-tika:9998

      # Single worker bleibt sauber und genügt hier
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}

    volumes:
      - open-webui:/app/backend/data

    depends_on:
      chromadb:
        condition: service_healthy
      open-tika:
        condition: service_started

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - openwebui-net

  chromadb:
    image: chromadb/chroma:0.5.15
    container_name: chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ALLOW_RESET: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - chromadb-data:/chroma/chroma
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v2/heartbeat', timeout=3).status == 200 else 1)"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - openwebui-net

  open-tika:
    image: apache/tika:2.9.1.0-full
    container_name: open-tika
    restart: unless-stopped
    expose:
      - "9998"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9998/version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - openwebui-net

  litellm_nostream:
    image: nginx:alpine
    container_name: litellm-nostream
    restart: unless-stopped
    volumes:
      - ./nginx/litellm_nostream.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "4100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4100 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - openwebui-net

volumes:
  open-webui:
  chromadb-data:

networks:
  openwebui-net:
    driver: bridge